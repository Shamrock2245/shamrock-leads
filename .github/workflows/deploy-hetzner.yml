# ════════════════════════════════════════════════════════════════════════════════
# ShamrockLeads — Auto-Deploy to Hetzner VPS
# ════════════════════════════════════════════════════════════════════════════════
# Triggers on push to main. SSHes into the VPS, pulls latest code,
# rebuilds Docker images, and restarts all services.
#
# Required GitHub Secrets:
#   HETZNER_SSH_KEY              — Private SSH key for root@178.156.179.237
#   FIREBASE_ADMINSDK_B64        — Base64-encoded firebase-adminsdk.json
#   FIREBASE_GOOGLE_SERVICES_B64 — Base64-encoded google-services.json
#
# ════════════════════════════════════════════════════════════════════════════════

name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy ShamrockLeads
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          FIREBASE_ADMINSDK_B64: ${{ secrets.FIREBASE_ADMINSDK_B64 }}
          FIREBASE_GOOGLE_SERVICES_B64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_B64 }}
        with:
          host: 178.156.179.237
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 20m
          envs: FIREBASE_ADMINSDK_B64,FIREBASE_GOOGLE_SERVICES_B64
          script: |
            set -e

            echo "═══════════════════════════════════════════════════"
            echo "  ShamrockLeads Deploy — $(date '+%Y-%m-%d %H:%M:%S')"
            echo "═══════════════════════════════════════════════════"

            cd /opt/shamrock-leads

            # ── Write Firebase secret files to config/ ────────────
            echo "🔑 Writing Firebase config files..."
            mkdir -p /opt/shamrock-leads/config
            if [ -n "$FIREBASE_ADMINSDK_B64" ]; then
              echo "$FIREBASE_ADMINSDK_B64" | base64 -d > /opt/shamrock-leads/config/firebase-adminsdk.json
              echo "   ✅ firebase-adminsdk.json written"
            else
              echo "   ⚠️  FIREBASE_ADMINSDK_B64 secret not set — skipping"
            fi
            if [ -n "$FIREBASE_GOOGLE_SERVICES_B64" ]; then
              echo "$FIREBASE_GOOGLE_SERVICES_B64" | base64 -d > /opt/shamrock-leads/config/google-services.json
              echo "   ✅ google-services.json written"
            else
              echo "   ⚠️  FIREBASE_GOOGLE_SERVICES_B64 secret not set — skipping"
            fi

            # ── Pull latest code ──────────────────────────────────
            echo ""
            echo "📥 Pulling latest from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo ""
            echo "📋 Latest commit:"
            git log --oneline -1

            # ── Free disk before rebuild (failed builds leave layers; VPS is tight) ──
            # Need ~2× image size free while old containers keep running during build.
            echo ""
            echo "🧹 Cleaning up disk space..."
            df -h / || true
            docker system df 2>/dev/null || true

            # Stopped containers + anonymous volumes
            docker container prune -f 2>/dev/null || true
            docker volume prune -f 2>/dev/null || true

            # BuildKit / intermediate layers (biggest source of "no space" mid-pip)
            docker builder prune -af 2>/dev/null || true
            docker buildx prune -af 2>/dev/null || true

            # ALL unused images (not just 7d+) — running containers keep their images
            docker image prune -af 2>/dev/null || true

            # Host clutter that accumulates on small Hetzner volumes
            apt-get clean 2>/dev/null || true
            journalctl --vacuum-size=80M 2>/dev/null || true
            rm -rf /tmp/pip-* /tmp/tmp* /var/tmp/pip-* 2>/dev/null || true
            # Dangling docker overlay temp from crashed builds
            rm -rf /var/lib/docker/tmp/* 2>/dev/null || true

            FREE_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            echo "   Disk free: $(df -h / | awk 'NR==2 {print $4}') (${FREE_KB} KB)"

            # If still under ~5 GB free, drop unused system objects hard
            if [ -n "$FREE_KB" ] && [ "$FREE_KB" -lt 5000000 ]; then
              echo "   ⚠️ Low disk (<5GB) — docker system prune -af"
              docker system prune -af 2>/dev/null || true
              docker builder prune -af 2>/dev/null || true
              FREE_KB=$(df -Pk / | awk 'NR==2 {print $4}')
              echo "   Disk free after system prune: $(df -h / | awk 'NR==2 {print $4}')"
            fi

            # Last resort: stop stack, remove project images, rebuild cold (brief downtime)
            if [ -n "$FREE_KB" ] && [ "$FREE_KB" -lt 2500000 ]; then
              echo "   ⚠️ Critical disk (<2.5GB) — stopping stack to reclaim image layers"
              docker compose down --remove-orphans 2>/dev/null || true
              docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' \
                | grep -E 'shamrock|leads|dashboard' \
                | awk '{print $2}' \
                | xargs -r docker rmi -f 2>/dev/null || true
              docker system prune -af 2>/dev/null || true
              echo "   Disk free after emergency reclaim: $(df -h / | awk 'NR==2 {print $4}')"
            fi

            # ── Ensure Obscura image is present (pulled, not built) ──
            echo ""
            echo "🦀 Ensuring Obscura image..."
            docker pull h4ckf0r0day/obscura:latest || echo "   ⚠️ Obscura pull failed (will use cached)"

            # ── Rebuild Docker images (only locally-built services) ──
            echo ""
            echo "🐳 Rebuilding Docker images..."
            # Prefer BuildKit; avoid leaving orphan cache when build fails mid-pip
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose build shamrock-leads dashboard

            # ── Rolling restart (avoids full downtime) ────────────
            # Force-recreate so Docker never fails with:
            #   "Conflict. The container name /shamrock-leads is already in use"
            # (orphaned/stopped containers from a prior half-failed deploy).
            echo ""
            echo "🔄 Rolling restart..."
            docker rm -f shamrock-leads shamrock-dashboard shamrock-osint-worker 2>/dev/null || true
            docker compose up -d --remove-orphans --force-recreate shamrock-leads dashboard osint-worker 2>/dev/null \
              || docker compose up -d --remove-orphans --force-recreate

            # ── Postiz healthcheck fix + optional social stack refresh ──
            # Image has no wget; compose uses node fetch. Recreate if social profile is in use.
            if docker ps -a --format '{{.Names}}' | grep -qx shamrock-postiz; then
              echo ""
              echo "📱 Refreshing Postiz (social profile)..."
              docker compose --profile social pull postiz 2>/dev/null || true
              docker compose --profile social up -d --force-recreate --no-deps postiz 2>/dev/null || true
            fi

            # ── frp server (BlueBubbles tunnel replacing Cloudflare/ngrok) ──
            # Secrets live only on VPS: deployment/frp/.frp_token (+ optional .frp_dashboard_pass)
            if [ -f deployment/frp/.frp_token ] && [ -f deployment/frp/frps.toml ]; then
              echo ""
              echo "🔐 Rehydrating frps.toml secrets from VPS token files..."
              TOKEN=$(cat deployment/frp/.frp_token)
              git show HEAD:deployment/frp/frps.toml > deployment/frp/frps.toml
              sed -i "s/CHANGE_ME_SET_FRP_TOKEN_IN_ENV/${TOKEN}/g" deployment/frp/frps.toml
              if [ -f deployment/frp/.frp_dashboard_pass ]; then
                DASH=$(cat deployment/frp/.frp_dashboard_pass)
                sed -i "s/CHANGE_ME_FRP_DASHBOARD_PASSWORD/${DASH}/g" deployment/frp/frps.toml
              fi
              chmod 600 deployment/frp/frps.toml
              docker compose --profile tunnel pull frps 2>/dev/null || true
              docker compose --profile tunnel up -d frps 2>/dev/null || true
            fi

            # ── Re-apply iptables rule for SOCKS proxy (iMac tunnel) ──
            echo ""
            echo "🔌 Re-applying SOCKS proxy firewall rule..."
            iptables -C INPUT -p tcp --dport 1080 -s 172.18.0.0/16 -j ACCEPT 2>/dev/null || \
              iptables -I INPUT -p tcp --dport 1080 -s 172.18.0.0/16 -j ACCEPT
            echo "   ✅ Docker → host:1080 allowed"

            # ── Verify ────────────────────────────────────────────
            # Dashboard startup can take 45–90s when BlueBubbles webhook
            # registration hits timeouts (Tailscale iMac offline, etc.).
            echo ""
            echo "⏳ Waiting for containers to stabilize..."
            sleep 15

            echo ""
            echo "📊 Container Status:"
            docker compose ps

            echo ""
            echo "🏥 Health Check:"
            HEALTH_URL="http://localhost:8088/health/live"
            SUCCESS=false
            for i in {1..18}; do
              if curl -sf --max-time 5 "$HEALTH_URL" > /dev/null; then
                SUCCESS=true
                break
              fi
              echo "   ⏳ Waiting for dashboard to respond (attempt $i/18)..."
              sleep 5
            done

            if [ "$SUCCESS" = true ]; then
              echo " ✅ Dashboard healthy (port 8088)"
            else
              echo " ⚠️ Dashboard health check failed after ~90s"
              docker logs shamrock-dashboard --tail 80 2>&1 || true
              exit 1
            fi

            echo ""
            echo "📜 Last 10 log lines (dashboard):"
            docker logs shamrock-dashboard --tail 10 2>&1

            echo ""
            echo "🔥 Firebase config check:"
            ls -la /opt/shamrock-leads/config/ 2>/dev/null || echo "   config/ directory not found"

            echo ""
            echo "═══════════════════════════════════════════════════"
            echo "  ✅ Deploy complete!"
            echo "═══════════════════════════════════════════════════"
