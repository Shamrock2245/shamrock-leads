# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name social.shamrockbailbonds.biz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Postiz reverse proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name social.shamrockbailbonds.biz;

    ssl_certificate     /etc/letsencrypt/live/social.shamrockbailbonds.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/social.shamrockbailbonds.biz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Allow embedding from the main dashboard
    add_header Content-Security-Policy   "frame-ancestors 'self' https://leads.shamrockbailbonds.biz http://localhost:*;" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    location / {
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        proxy_pass         http://127.0.0.1:5200;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout  60s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
        proxy_buffering off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass         http://127.0.0.1:5200;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }
}
