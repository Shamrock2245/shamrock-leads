# ============================================
# ShamrockLeads — Docker Compose
# Runs: Scraper Engine + Dashboard
# Node-RED: only on VPS (use --profile ops)
# ============================================
#
# Network: all services share `shamrock-net` so that Docker DNS
# resolves container hostnames (e.g. `shamrock-dashboard`, `traccar`)
# across services.  Traccar forwards webhooks to:
#   http://shamrock-dashboard:5050/api/traccar/webhook
# This explicit network guarantees that hostname is reachable.

networks:
  shamrock-net:
    driver: bridge

services:
  # ── Core: Scraper + Scoring Engine ──
  shamrock-leads:
    build: .
    container_name: shamrock-leads
    restart: unless-stopped
    dns:
      - 8.8.8.8                         # Force Google DNS (bypasses VPS resolver)
      - 1.1.1.1                         # Cloudflare DNS fallback
    env_file:
      - .env
    volumes:
      - ./creds:/app/creds:ro           # GCP service account key
      - ./logs:/app/logs                # Persistent logs
    networks:
      - shamrock-net
    # ── Security Hardening ──
    security_opt:
      - no-new-privileges:true          # Prevent privilege escalation
    tmpfs:
      - /tmp:size=256m                  # Writable temp (browser profiles, xvfb)
    mem_limit: 4g                       # Cap memory (scrapers + Chromium)
    cpus: 2.0                           # Cap CPU
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Intelligence Dashboard (FastAPI + Uvicorn) ──
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: shamrock-dashboard
    hostname: shamrock-dashboard
    restart: unless-stopped
    dns:
      - 8.8.8.8                         # Force Google DNS — resolves Wix CNAME for bb.shamrockbailbonds.biz
      - 1.1.1.1                         # Cloudflare DNS fallback
    command: uvicorn dashboard.main:app --host 0.0.0.0 --port 5050 --access-log --log-level info
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    ports:
      - "8088:5050"                     # Dashboard UI (external 8088)
    depends_on:
      - shamrock-leads
      - traccar
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - dashboard-uploads:/app/dashboard/uploads  # Persistent KYC uploads
      - ./config:/app/config:ro                   # Firebase admin SDK + secrets
    networks:
      - shamrock-net
    # ── Security Hardening ──
    security_opt:
      - no-new-privileges:true          # Prevent privilege escalation
    read_only: true                     # Root filesystem read-only
    tmpfs:
      - /tmp:size=128m                  # Writable temp for Uvicorn
    mem_limit: 2g                       # Cap memory (dashboard API)
    cpus: 1.5                           # Cap CPU
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Traccar GPS Intelligence Engine ──
  # Real-time GPS tracking server (Java) — 200+ device protocols
  # REST API on 8082 (internal), webhooks to dashboard:5050
  traccar:
    image: traccar/traccar:latest
    container_name: shamrock-traccar
    restart: unless-stopped
    hostname: traccar
    volumes:
      - traccar-data:/opt/traccar/data        # H2 database (persistent)
      - traccar-logs:/opt/traccar/logs         # Server logs
      - ./config/traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro  # Custom config
    ports:
      - "8082:8082"                            # Traccar REST API + Web UI
      - "5055:5055"                            # OsmAnd protocol (phone app tracking)
      - "5055:5055/udp"                        # OsmAnd UDP
      - "5001:5001"                            # GPS103/TK103 (vehicle trackers)
      - "5013:5013"                            # H02 (personal/ankle trackers)
      - "5023:5023"                            # GT06 (OBD2 vehicle)
      - "5027:5027"                            # Teltonika (professional fleet)
    networks:
      - shamrock-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/api/server"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ops Dashboard: Node-RED ──
  # Only starts with: docker compose --profile ops up -d
  # On VPS (Hetzner), managed by the shamrock-node-red repo separately.
  # Included here for convenience if you want everything in one stack.
  node-red:
    image: nodered/node-red:latest
    container_name: shamrock-node-red
    restart: unless-stopped
    profiles:
      - ops                             # Won't start by default
    environment:
      - TZ=America/New_York
    volumes:
      - node-red-data:/data             # Persistent flows + config
    ports:
      - "1880:1880"                     # Node-RED dashboard
    networks:
      - shamrock-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Social Engine: Content Repurposer + Publisher ──
  # Starts with: docker compose --profile social up -d
  # Or include in full stack: docker compose --profile social --profile ops up -d
  social:
    build:
      context: .
      dockerfile: social/Dockerfile
    container_name: shamrock-social
    hostname: shamrock-social
    restart: unless-stopped
    profiles:
      - social                            # Won't start by default
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: uvicorn social.main:app --host 0.0.0.0 --port 5060 --access-log --log-level info --workers 1
    env_file:
      - .env
    environment:
      - SOCIAL_GROK_ENABLED=true
      - SOCIAL_HUMANIZER_ENABLED=true
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./creds:/app/creds:ro             # GCP service account (Gmail scanner)
    ports:
      - "8089:5060"                       # Social Engine API (external 8089)
    depends_on:
      - dashboard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5060/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - shamrock-net
    # ── Security Hardening ──
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=128m
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Postiz: Open-Source Social Media Manager ──
  # Self-hosted Buffer/Ayrshare alternative — $0/month
  # 30+ platforms, OAuth management, scheduling, analytics
  # Starts with: docker compose --profile social up -d
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: shamrock-postiz
    hostname: postiz
    restart: always                       # Must retry — Temporal takes ~60s to start
    profiles:
      - social                            # Won't start by default
    environment:
      # ── Core URLs (behind Nginx reverse proxy) ──
      MAIN_URL: "${POSTIZ_MAIN_URL:-http://178.156.179.237:5200}"
      FRONTEND_URL: "${POSTIZ_MAIN_URL:-http://178.156.179.237:5200}"
      NEXT_PUBLIC_BACKEND_URL: "${POSTIZ_MAIN_URL:-http://178.156.179.237:5200}/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      # ── Auth ──
      JWT_SECRET: "${POSTIZ_JWT_SECRET:-shamrock-postiz-jwt-secret-change-me}"
      # ── Database ──
      DATABASE_URL: "postgresql://postiz:${POSTIZ_DB_PASSWORD:-shamrock_postiz_2026}@postiz-postgres:5432/postiz"
      REDIS_URL: "redis://postiz-redis:6379"
      # ── Temporal (required v2.12+) ──
      TEMPORAL_ADDRESS: "temporal:7233"
      # ── Self-hosting config ──
      IS_GENERAL: "true"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
      # ── Optional: AI content gen (uses our OpenAI key) ──
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "5200:5000"                       # Postiz UI + API (external 5200)
    volumes:
      - postiz-config:/config
      - postiz-uploads:/uploads
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - shamrock-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/auth/me", "||", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 2g
    cpus: 1.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Temporal Workflow Engine (required by Postiz v2.12+) ──
  # Handles background scheduling, retries, and workflow orchestration
  # Config mirrors official: github.com/gitroomhq/postiz-docker-compose
  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: shamrock-temporal
    restart: unless-stopped
    profiles:
      - social
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    depends_on:
      - temporal-postgres
      - temporal-elasticsearch
    volumes:
      - ./config/temporal-dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      - shamrock-net
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Elasticsearch for Temporal (visibility store) ──
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: shamrock-temporal-elasticsearch
    restart: unless-stopped
    profiles:
      - social
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    expose:
      - 9200
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - shamrock-net
    mem_limit: 1g
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── PostgreSQL for Temporal ──
  temporal-postgres:
    image: postgres:16
    container_name: shamrock-temporal-postgres
    restart: unless-stopped
    profiles:
      - social
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    expose:
      - 5432
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - shamrock-net
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── PostgreSQL for Postiz ──
  postiz-postgres:
    image: postgres:17-alpine
    container_name: shamrock-postiz-postgres
    restart: unless-stopped
    profiles:
      - social
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: "${POSTIZ_DB_PASSWORD:-shamrock_postiz_2026}"
      POSTGRES_DB: postiz
    volumes:
      - postiz-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz -d postiz"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - shamrock-net
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis for Postiz (queue/cache) ──
  postiz-redis:
    image: redis:7-alpine
    container_name: shamrock-postiz-redis
    restart: unless-stopped
    profiles:
      - social
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - shamrock-net
    mem_limit: 256m
    cpus: 0.25
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  node-red-data:
    driver: local
  dashboard-uploads:
    driver: local
  traccar-data:
    driver: local
  traccar-logs:
    driver: local
  postiz-config:
    driver: local
  postiz-uploads:
    driver: local
  postiz-postgres-data:
    driver: local
  temporal-postgres-data:
    driver: local
  temporal-elasticsearch-data:
    driver: local
