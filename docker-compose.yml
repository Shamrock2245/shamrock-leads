# ============================================
# ShamrockLeads — Docker Compose
# Runs: Scraper Engine + Dashboard + Node-RED
# ============================================
version: "3.9"

services:
  # ── Core: Scraper + Scoring Engine ──
  shamrock-leads:
    build: .
    container_name: shamrock-leads
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./creds:/app/creds:ro           # GCP service account key
      - ./logs:/app/logs                # Persistent logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Intelligence Dashboard (Flask) ──
  dashboard:
    build: .
    container_name: shamrock-dashboard
    restart: unless-stopped
    command: python dashboard/app.py
    env_file:
      - .env
    ports:
      - "5050:5050"                     # Dashboard UI
    depends_on:
      - shamrock-leads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ops Dashboard: Node-RED ──
  node-red:
    image: nodered/node-red:latest
    container_name: shamrock-node-red
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    volumes:
      - node-red-data:/data             # Persistent flows + config
    ports:
      - "1880:1880"                     # Node-RED dashboard
    depends_on:
      - shamrock-leads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  node-red-data:
    driver: local
