# ════════════════════════════════════════════════════════════════════════════════
# Nginx Reverse Proxy — leads.shamrockbailbonds.biz
# ════════════════════════════════════════════════════════════════════════════════
#
# PURPOSE
#   Proxies all traffic for leads.shamrockbailbonds.biz to the ShamrockLeads
#   dashboard running on localhost:8088 (Docker → internal 5050).
#
#   This replaces raw IP links (http://178.156.179.237:8088/g/<token>) with
#   branded HTTPS links (https://leads.shamrockbailbonds.biz/g/<token>).
#
# INSTALL
#   sudo cp leads.shamrockbailbonds.biz.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/leads.shamrockbailbonds.biz.conf \
#               /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt — run AFTER DNS A record is live)
#   sudo certbot --nginx -d leads.shamrockbailbonds.biz \
#                        --non-interactive --agree-tos \
#                        -m admin@shamrockbailbonds.biz
#
# DNS RECORD REQUIRED (add in your registrar / Wix DNS panel)
#   Type: A
#   Host: leads
#   Value: 178.156.179.237
#   TTL: 300 (5 min — lower = faster propagation)
# ════════════════════════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name leads.shamrockbailbonds.biz;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS → Dashboard proxy ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name leads.shamrockbailbonds.biz;

    # ── SSL certificates (managed by certbot) ────────────────────────────────
    # Certbot will insert these lines automatically when you run certbot --nginx.
    # If you prefer manual management, uncomment and set the paths:
    # ssl_certificate     /etc/letsencrypt/live/leads.shamrockbailbonds.biz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/leads.shamrockbailbonds.biz/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Geo-capture page: no caching, allow geolocation ──────────────────────
    location ~ ^/g/ {
        proxy_pass         http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable caching for geo capture pages
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache" always;

        # Allow browser geolocation API over HTTPS (required for GPS capture)
        add_header Permissions-Policy "geolocation=(self)" always;

        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # ── BlueBubbles webhook receiver ──────────────────────────────────────────
    location /api/webhooks/bb {
        proxy_pass         http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── All other API and dashboard routes ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8088;
        proxy_http_version 1.1;

        # WebSocket support (for dashboard live updates)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running API calls (e.g. batch normalize)
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Buffer settings for large responses (PDF generation)
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         8 16k;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/leads.shamrockbailbonds.biz.access.log;
    error_log  /var/log/nginx/leads.shamrockbailbonds.biz.error.log warn;
}
