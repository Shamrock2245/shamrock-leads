# ════════════════════════════════════════════════════════════════════════════════
# Nginx Reverse Proxy — trape.shamrockbailbonds.biz
# OSINT Skip-Trace Tracking Server (Trape)
# ════════════════════════════════════════════════════════════════════════════════
#
# PURPOSE
#   Routes HTTPS traffic for trape.shamrockbailbonds.biz to the Trape
#   process running on localhost:8099 on the Hetzner VPS.
#
#   Trape is an on-demand tool — it is started manually via SSH before a
#   skip-trace session and stopped when the session ends. Nginx will return
#   a 502 when Trape is not running, which is expected behavior.
#
# INSTALL (two-stage — HTTP first, then certbot adds HTTPS)
#   1. Copy config + enable site:
#      sudo cp nginx/trape.shamrockbailbonds.biz.conf /etc/nginx/sites-available/
#      sudo ln -sf /etc/nginx/sites-available/trape.shamrockbailbonds.biz.conf \
#                  /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
#
#   2. Obtain SSL cert (certbot will add HTTPS block automatically):
#      sudo certbot --nginx -d trape.shamrockbailbonds.biz \
#                   --non-interactive --agree-tos -m admin@shamrockbailbonds.biz
#
#   3. Add DNS record in Wix DNS:
#      Host: trape  |  Type: A  |  Value: 178.156.179.237
#
# DNS RECORD REQUIRED (Wix DNS panel):
#   trape.shamrockbailbonds.biz  A  178.156.179.237
#
# SECURITY NOTES
#   - Access is restricted to requests containing a valid session token in the
#     URL path (enforced by Trape itself, not Nginx).
#   - Rate limiting is applied to prevent abuse of the tracking endpoint.
#   - The /admin panel is blocked at the Nginx level — Trape's admin UI must
#     be accessed via SSH tunnel only: ssh -L 8099:localhost:8099 root@178.156.179.237
#
# ════════════════════════════════════════════════════════════════════════════════

# Rate limit zone — prevents tracking link abuse
limit_req_zone $binary_remote_addr zone=trape_limit:10m rate=30r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name trape.shamrockbailbonds.biz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server block ────────────────────────────────────────────────────────
# NOTE: SSL certificate paths will be inserted by certbot --nginx automatically.
# The block below is the pre-certbot template.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trape.shamrockbailbonds.biz;

    # SSL — managed by certbot (paths inserted automatically)
    # ssl_certificate     /etc/letsencrypt/live/trape.shamrockbailbonds.biz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/trape.shamrockbailbonds.biz/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Block Trape admin panel from public access ────────────────────────────
    # Admin must be accessed via SSH tunnel: ssh -L 8099:localhost:8099 root@VPS
    location /admin {
        deny all;
        return 403;
    }

    location /static/ {
        deny all;
        return 403;
    }

    # ── Tracking endpoints (rate limited) ────────────────────────────────────
    location / {
        limit_req zone=trape_limit burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow browser geolocation API (required for GPS capture)
        add_header Permissions-Policy "geolocation=(self)" always;

        # Disable caching — tracking pages must always be fresh
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache" always;

        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;

        # Graceful error when Trape is not running
        proxy_intercept_errors on;
        error_page 502 503 504 = @trape_offline;
    }

    # ── Offline fallback (shown when Trape process is not running) ────────────
    location @trape_offline {
        default_type text/html;
        return 503 '<html><body style="font-family:sans-serif;text-align:center;padding:60px;background:#111;color:#888"><h2>Service Temporarily Unavailable</h2><p>Please try again shortly.</p></body></html>';
    }

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "no-referrer" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/trape.shamrockbailbonds.biz.access.log;
    error_log  /var/log/nginx/trape.shamrockbailbonds.biz.error.log warn;
}
