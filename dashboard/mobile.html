<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ShamrockLeads — Mobile Dashboard</title>
  <style>
    :root {
      --green:  #22c55e;
      --yellow: #eab308;
      --red:    #ef4444;
      --blue:   #3b82f6;
      --gray:   #6b7280;
      --bg:     #0f172a;
      --card:   #1e293b;
      --border: #334155;
      --text:   #f1f5f9;
      --muted:  #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Header ── */
    header { background: linear-gradient(135deg, #064e3b 0%, #065f46 100%); padding: 16px; padding-top: max(16px, env(safe-area-inset-top)); }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 28px; }
    .logo-text h1 { font-size: 1.2rem; font-weight: 700; }
    .logo-text p { font-size: 0.65rem; color: #a7f3d0; }
    .ts { font-size: 0.65rem; color: #6ee7b7; text-align: right; }

    /* ── Stats ── */
    .stats { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; padding: 12px 16px; gap: 20px; }
    .stat { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
    .stat-val { font-size: 1.5rem; font-weight: 700; line-height: 1; }
    .stat-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; margin-top: 3px; }
    .green { color: var(--green); } .yellow { color: var(--yellow); } .blue { color: var(--blue); } .gray-c { color: var(--gray); }

    /* ── Search ── */
    .search-wrap { padding: 12px 16px 6px; }
    .search-box { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 1rem; outline: none; }
    .search-box:focus { border-color: var(--green); }

    /* ── Filter Pills ── */
    .pills { display: flex; gap: 8px; padding: 6px 16px 10px; overflow-x: auto; }
    .pill { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 0.75rem; color: var(--muted); white-space: nowrap; cursor: pointer; }
    .pill.active { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }

    /* ── List ── */
    .list { padding: 0 16px 80px; }
    .section-title { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

    .county-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .county-row.status-active   { border-left: 3px solid var(--green); }
    .county-row.status-porting  { border-left: 3px solid var(--yellow); }
    .county-row.status-validated{ border-left: 3px solid var(--blue); }
    .county-row.status-recon    { border-left: 3px solid var(--gray); }
    .county-row.hidden { display: none; }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green  { background: var(--green); }
    .dot.yellow { background: var(--yellow); }
    .dot.blue   { background: var(--blue); }
    .dot.gray   { background: var(--gray); }

    .row-info { flex: 1; min-width: 0; }
    .row-name { font-size: 0.95rem; font-weight: 600; }
    .row-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .row-right { text-align: right; flex-shrink: 0; }
    .row-interval { font-size: 0.7rem; color: var(--muted); }
    .row-link { font-size: 0.7rem; color: var(--blue); text-decoration: none; display: block; margin-top: 2px; }

    /* ── Bottom Nav ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; padding: 8px 0; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 0.6rem; color: var(--muted); cursor: pointer; }
    .nav-item.active { color: var(--green); }
    .nav-icon { font-size: 1.2rem; }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">
      <div class="logo-icon">🍀</div>
      <div class="logo-text">
        <h1>ShamrockLeads</h1>
        <p>Arrest Intelligence Platform</p>
      </div>
    </div>
    <div class="ts" id="ts">—</div>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-val green">36</div><div class="stat-lbl">Active</div></div>
  <div class="stat"><div class="stat-val yellow">7</div><div class="stat-lbl">Porting</div></div>
  <div class="stat"><div class="stat-val blue">2</div><div class="stat-lbl">Validated</div></div>
  <div class="stat"><div class="stat-val gray-c">22</div><div class="stat-lbl">Recon</div></div>
  <div class="stat"><div class="stat-val gray-c">67</div><div class="stat-lbl">Total</div></div>
</div>

<div class="search-wrap">
  <input class="search-box" type="search" id="search" placeholder="🔍 Search county…" oninput="filterRows()" />
</div>

<div class="pills">
  <div class="pill active" onclick="setFilter('all',this)">All</div>
  <div class="pill" onclick="setFilter('active',this)">✅ Active</div>
  <div class="pill" onclick="setFilter('porting',this)">🔄 Porting</div>
  <div class="pill" onclick="setFilter('validated',this)">🔵 Validated</div>
  <div class="pill" onclick="setFilter('recon',this)">🟡 Recon</div>
</div>

<div class="list" id="list"></div>

<div class="bottom-nav">
  <div class="nav-item active"><div class="nav-icon">📊</div>Dashboard</div>
  <div class="nav-item" onclick="window.location='index.html'"><div class="nav-icon">🖥️</div>Desktop</div>
  <div class="nav-item"><div class="nav-icon">🍀</div>ShamrockLeads</div>
</div>

<script>
const COUNTIES = [

  { tier:1, name:"Collier",      status:"active",    jms:"Odyssey",    interval:"30 min",  url:"https://www2.colliersheriff.org/arrestsearch/Report.aspx" },
  { tier:1, name:"Charlotte",    status:"active",    jms:"Custom",     interval:"45 min",  url:"https://www.ccso.org/inmate-search" },
  { tier:1, name:"Manatee",      status:"active",    jms:"New World",  interval:"45 min",  url:"https://www.manateesheriff.com/inmate-search" },
  { tier:1, name:"Sarasota",     status:"active",    jms:"Odyssey",    interval:"60 min",  url:"https://www.sarasotasheriff.org/inmate-search" },
  { tier:1, name:"DeSoto",       status:"active",    jms:"JailTracker",interval:"60 min",  url:"https://www.desotoso.com/inmate-search" },
  { tier:1, name:"Hendry",       status:"active",    jms:"OCV/VINE",   interval:"120 min", url:"https://www.hendrysheriff.org/inmateSearch" },
  { tier:2, name:"Hillsborough", status:"active",    jms:"New World",  interval:"90 min",  url:"https://www.hcso.tampa.fl.us/inmate-search" },
  { tier:2, name:"Pinellas",     status:"active",    jms:"Custom",     interval:"90 min",  url:"https://www.pinellassheriff.gov/InmateBooking" },
  { tier:2, name:"Seminole",     status:"active",    jms:"Custom",     interval:"90 min",  url:"https://www.seminolesheriff.org/inmate-search" },
  { tier:2, name:"Orange",       status:"active",    jms:"Custom",     interval:"90 min",  url:"https://www.ocso.com/inmate-search" },
  { tier:2, name:"Pasco",        status:"active",    jms:"Custom",     interval:"90 min",  url:"https://www.pascosheriff.org/inmate-search" },
  { tier:2, name:"Lake",         status:"active",    jms:"Superion",   interval:"90 min",  url:"https://www.lcso.org/inmates/" },
  { tier:2, name:"Hernando",     status:"active",    jms:"Custom",     interval:"90 min",  url:"https://www.hernandosheriff.org/inmate-search" },
  { tier:2, name:"Polk",         status:"active",    jms:"Odyssey",    interval:"120 min", url:"https://www.polksheriff.org/inmates" },
  { tier:2, name:"Osceola",      status:"active",    jms:"Custom",     interval:"120 min", url:"https://www.osceolacofl.gov/inmate-search" },
  { tier:2, name:"Citrus",       status:"active",    jms:"Custom",     interval:"120 min", url:"https://www.sheriffcitrus.org/public_info/recent_arrest.php" },
  { tier:2, name:"Sumter",       status:"active",    jms:"SmartCOP",   interval:"180 min", url:"http://portal.sumtercountysheriff.org/smartwebclient/Jail.aspx" },
  { tier:3, name:"Broward",      status:"active",    jms:"Custom",     interval:"60 min",  url:"https://www.sheriff.org/Divisions/Pages/Corrections/InmateSearch.aspx" },
  { tier:3, name:"Palm Beach",   status:"active",    jms:"Custom",     interval:"120 min", url:"https://www.pbso.org/inmate-search" },
  { tier:3, name:"Martin",       status:"active",    jms:"Custom",     interval:"120 min", url:"https://www.martinso.us/inmatesearch/" },
  { tier:3, name:"St. Lucie",    status:"active",    jms:"Custom",     interval:"90 min",  url:"https://www.stluciesheriff.com/divisions/corrections/inmate-search" },
  { tier:3, name:"Indian River", status:"active",    jms:"Custom",     interval:"120 min", url:"https://www.ircsheriff.org/inmate-search" },
  { tier:3, name:"Highlands",    status:"active",    jms:"OCV/VINE",   interval:"120 min", url:"https://www.highlandssheriff.org/inmateSearch" },
  { tier:3, name:"Glades",       status:"active",    jms:"SmartCOP",   interval:"180 min", url:"http://smartweb.gladessheriff.org/smartwebclient/Jail.aspx" },
  { tier:3, name:"Miami-Dade",   status:"recon",     jms:"Custom",     interval:"—",       url:"https://www.miamidade.gov/corrections/inmate-search.asp" },
  { tier:3, name:"Monroe",       status:"recon",     jms:"Custom",     interval:"—",       url:"https://www.keysso.net/inmate-search" },
  { tier:4, name:"Alachua",      status:"active",    jms:"ASP.NET",    interval:"90 min",  url:"https://asosite.alachuasheriff.org/ASOInmateLookup.aspx" },
  { tier:4, name:"Marion",       status:"active",    jms:"Custom",     interval:"90 min",  url:"https://jail.marionso.com/" },
  { tier:4, name:"Volusia",      status:"active",    jms:"Custom",     interval:"90 min",  url:"https://www.vcso.us/inmate-search" },
  { tier:4, name:"Brevard",      status:"active",    jms:"Custom",     interval:"120 min", url:"https://www.brevardcounty.us/JailCompliance/SubSearch" },
  { tier:4, name:"Putnam",       status:"active",    jms:"SmartCOP",   interval:"180 min", url:"http://smartweb.pcso.us/smartwebclient/Jail.aspx" },
  { tier:5, name:"Escambia",     status:"active",    jms:"Custom",     interval:"120 min", url:"https://www.escambiasheriff.com/inmate-search" },
  { tier:5, name:"Okaloosa",     status:"active",    jms:"Archonix",   interval:"120 min", url:"http://www3.myokaloosa.com/ArchonixXJailPublic/Default.aspx" },
  { tier:5, name:"Bay",          status:"active",    jms:"Custom",     interval:"120 min", url:"https://baysomobile.org" },
  { tier:5, name:"Leon",         status:"active",    jms:"Odyssey",    interval:"90 min",  url:"https://www.leoncountyso.com/resources/inmate-search" },
  { tier:6, name:"Duval",        status:"active",    jms:"Custom",     interval:"90 min",  url:"https://inmatesearch.jaxsheriff.org/" },
  { tier:6, name:"St. Johns",    status:"active",    jms:"Custom",     interval:"120 min", url:"https://www.stjohnssheriff.org/inmate-search" },
  { tier:7, name:"Taylor",       status:"active",    jms:"SmartCOP",   interval:"240 min", url:"http://smartcop.taylorsheriff.org/smartwebclient/Jail.aspx" },
  { tier:7, name:"Dixie",        status:"active",    jms:"SmartCOP",   interval:"240 min", url:"http://smartcop.dixiecountysheriff.com/smartwebclient/Jail.aspx" },
];

const TIER_LABELS = {
  1:"Tier 1 — SWFL Core",
  2:"Tier 2 — Tampa Bay / Central FL",
  3:"Tier 3 — South FL / Metro",
  4:"Tier 4 — North Central FL",
  5:"Tier 5 — Panhandle / NW FL",
  6:"Tier 6 — NE FL / First Coast",
  7:"Tier 7 — North FL / Rural",
};

let currentFilter = 'all';

function dotColor(s) {
  return {active:'green',porting:'yellow',validated:'blue',recon:'gray',blocked:'red'}[s]||'gray';
}

function renderList() {
  const list = document.getElementById('list');
  let html = '';
  let lastTier = null;
  for (const c of COUNTIES) {
    if (c.tier !== lastTier) {
      html += `<div class="section-title">${TIER_LABELS[c.tier]||'Tier '+c.tier}</div>`;
      lastTier = c.tier;
    }
    html += `
      <div class="county-row status-${c.status}" data-status="${c.status}" data-name="${c.name.toLowerCase()}">
        <div class="dot ${dotColor(c.status)}"></div>
        <div class="row-info">
          <div class="row-name">${c.name}</div>
          <div class="row-meta">${c.jms} · Tier ${c.tier}</div>
        </div>
        <div class="row-right">
          <div class="row-interval">⏱ ${c.interval}</div>
          <a class="row-link" href="${c.url}" target="_blank" rel="noopener">Source ↗</a>
        </div>
      </div>`;
  }
  list.innerHTML = html;
}

function filterRows() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.county-row').forEach(row => {
    const nameMatch = row.dataset.name.includes(q);
    const statusMatch = currentFilter === 'all' || row.dataset.status === currentFilter;
    row.classList.toggle('hidden', !(nameMatch && statusMatch));
  });
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  filterRows();
}

function updateTs() {
  document.getElementById('ts').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'}) + ' ET';
}

renderList();
updateTs();
setInterval(updateTs, 60000);
</script>
</body>
</html>
